name: Build and deploy

on:
  push:
    branches: [master, data]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest data
        run: |
          git fetch origin data
          git show origin/data:nahl.gaps.json > web/public/nahl.gaps.json
          git show origin/data:ushl.gaps.json > web/public/ushl.gaps.json || \
            git show origin/data:gaps.json > web/public/ushl.gaps.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - uses: actions/deploy-pages@v4
        id: deploy
